name: Deploy to MonsterASP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore "Dimakotso Construction/Dimakotso Construction.csproj"

      - name: Build Project
        run: dotnet build "Dimakotso Construction/Dimakotso Construction.csproj" --configuration Release --no-restore

      - name: Install EF Core Tool
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          dotnet-ef --version

      - name: Run Entity Framework Migrations
        working-directory: ./Dimakotso Construction
        shell: pwsh
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          dotnet-ef database update --verbose

      - name: Publish Project
        run: |
          dotnet publish "Dimakotso Construction/Dimakotso Construction.csproj" `
            --configuration Release `
            --no-build `
            --output ./publish

      - name: Verify Publish Output
        shell: pwsh
        run: |
          Write-Host "Published files:"
          Get-ChildItem ./publish -Recurse

      - name: Deploy to MonsterASP
        shell: pwsh
        env:
          SERVER: ${{ secrets.MSDEPLOY_SERVICE_URL }}
          SITE: ${{ secrets.MSDEPLOY_SITE_NAME }}
          USERNAME: ${{ secrets.MSDEPLOY_USERNAME }}
          PASSWORD: ${{ secrets.MSDEPLOY_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"

          if (!(Test-Path $msdeploy)) {
              throw "msdeploy.exe not found."
          }

          $publishPath = (Resolve-Path "./publish").Path

          Write-Host "Deploying from: $publishPath"
          Write-Host "Server: $env:SERVER"
          Write-Host "Site: $env:SITE"

          & $msdeploy `
            -verb:sync `
            "-source:contentPath=$publishPath" `
            "-dest:auto,computerName=$env:SERVER,userName=$env:USERNAME,password=$env:PASSWORD,authType=Basic,includeAcls=False" `
            -allowUntrusted `
            -enableRule:DoNotDeleteRule `
            -verbose
