name: Deploy to MonsterASP

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build and Publish
        run: dotnet publish -c Release -o ./publish

      # Run EF Migrations using the connection string secret
      - name: Run Entity Framework Migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update --connection "${{ secrets.DB_CONNECTION_STRING }}" --Dimakotso Construction.csproj

      # Deploy using the Publish Profile content
      - name: Deploy to MonsterASP
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.MSDEPLOY_SITE_NAME }}
          publish-profile: ${{ secrets.PUBLISH_PROFILE_CONTENT }}
          package: ./publish
