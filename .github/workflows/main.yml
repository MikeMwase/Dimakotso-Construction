name: Deploy to MonsterASP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore "Dimakotso Construction/Dimakotso Construction.csproj"

      - name: Build Project
        run: dotnet build "Dimakotso Construction/Dimakotso Construction.csproj" --configuration Release --no-restore

      - name: Install EF Core Tool
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          dotnet-ef --version

      - name: Run Entity Framework Migrations
        working-directory: ./Dimakotso Construction
        shell: pwsh
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          dotnet-ef database update --verbose

      - name: Publish Project
        run: dotnet publish "Dimakotso Construction/Dimakotso Construction.csproj" -c Release --no-build -o ./publish

      - name: Deploy to MonsterASP
        shell: pwsh
        env:
          MSDEPLOY_SERVER: ${{ secrets.MSDEPLOY_SERVER }}
          MSDEPLOY_SITE: ${{ secrets.MSDEPLOY_SITE }}
          MSDEPLOY_USERNAME: ${{ secrets.MSDEPLOY_USERNAME }}
          MSDEPLOY_PASSWORD: ${{ secrets.MSDEPLOY_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"

          & $msdeploy `
            -verb:sync `
            -source:contentPath="$PWD\publish" `
            -dest:contentPath="$env:MSDEPLOY_SITE",computerName="https://$env:MSDEPLOY_SERVER/msdeploy.axd?site=$env:MSDEPLOY_SITE",userName="$env:MSDEPLOY_USERNAME",password="$env:MSDEPLOY_PASSWORD",authType="Basic" `
            -allowUntrusted
