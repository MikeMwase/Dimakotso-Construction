name: Deploy to MonsterASP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore "Dimakotso Construction/Dimakotso Construction.csproj"

      - name: Build Project
        run: dotnet build "Dimakotso Construction/Dimakotso Construction.csproj" --configuration Release --no-restore

      - name: Install EF Core Tool
        run: dotnet tool install --global dotnet-ef

      - name: Run Entity Framework Migrations
        working-directory: ./Dimakotso Construction
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          dotnet ef database update --verbose

      - name: Publish Project
        run: dotnet publish "Dimakotso Construction/Dimakotso Construction.csproj" --configuration Release --no-build --output ./publish

      - name: Deploy to MonsterASP
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.MSDEPLOY_SITE_NAME }}
          publish-profile: ${{ secrets.PUBLISH_PROFILE_CONTENT }}
          package: ./publish
